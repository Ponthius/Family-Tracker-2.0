<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todos — Todo App</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Navbar is injected here by todos.ts -->

  <main class="max-w-xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">My Todos</h1>

    <!-- Add todo form -->
    <form id="add-form" class="flex gap-2 mb-6">
      <input
        id="todo-title"
        type="text"
        placeholder="What needs to be done?"
        class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <button
        type="submit"
        class="bg-indigo-600 text-white font-semibold px-4 py-2 rounded-lg
               hover:bg-indigo-700 transition-colors whitespace-nowrap"
      >
        Add todo
      </button>
    </form>

    <!-- Empty state -->
    <p id="empty-message" class="text-center text-gray-400 py-8 hidden">
      No todos yet. Add one above!
    </p>

    <!-- Todo list — items are added here by todos.ts -->
    <ul id="todo-list" class="space-y-2"></ul>
  </main>

  <!-- todos.js is compiled from src/client/scripts/todos.ts -->
  <script type="module" src="/scripts/todos.js"></script>
</body>
</html>
