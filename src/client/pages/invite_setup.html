<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Family</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-stone-200 flex items-center justify-center p-5">

  <div class="w-full max-w-md rounded-xl bg-stone-100 shadow-lg p-8">

    <h2 class="mb-3 text-center text-2xl font-bold font-serif text-stone-800">
      Join Family
    </h2>

    <div
      id="familyName"
      class="mb-6 text-center text-sm text-stone-600">
      Family:
    </div>

    <form id="inviteForm" class="space-y-5">

      <div>
        <label
          for="username"
          class="mb-2 block text-sm font-medium text-stone-600">
          Username
        </label>

        <input
          type="text"
          id="username"
          placeholder="Enter username"
          required
          class="w-full rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800 outline-none transition focus:border-amber-700 focus:ring-2 focus:ring-amber-700/20"
        />
      </div>

      <div>
        <label
          for="password"
          class="mb-2 block text-sm font-medium text-stone-600">
          Password
        </label>

        <input
          type="password"
          id="password"
          placeholder="Enter password"
          required
          class="w-full rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800 outline-none transition focus:border-amber-700 focus:ring-2 focus:ring-amber-700/20"
        />
      </div>

      <div>
        <label
          for="confirmPassword"
          class="mb-2 block text-sm font-medium text-stone-600">
          Confirm Password
        </label>

        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm password"
          required
          class="w-full rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800 outline-none transition focus:border-amber-700 focus:ring-2 focus:ring-amber-700/20"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-md bg-stone-800 py-3 text-sm font-semibold text-white transition hover:bg-stone-900">
        Create Account
      </button>

    </form>

    <div
      id="message"
      class="mt-5 text-center text-sm">
    </div>

  </div>

  <script type="module" src="../scripts/invite-setup.js"></script>

</body>
</html>
