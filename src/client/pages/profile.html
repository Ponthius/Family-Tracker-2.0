<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings - Family Tracker</title>
  <!-- CHANGED: no more profile.css, uses shared Tailwind build -->
  <link rel="stylesheet" href="/styles/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- REMOVED: i18next CDN script — replaced by our own lib/i18n.ts -->
</head>
<body class="font-body bg-bg text-app-text">

  <!-- Navbar is injected here by profile.ts, same pattern as todos.ts -->

  <div class="max-w-xl mx-auto my-10 bg-surface rounded-xl border border-border p-8">

    <!-- BREADCRUMB -->
    <nav class="breadcrumb mb-5" aria-label="breadcrumb">
      <ol class="flex gap-2 text-sm list-none">
        <li><a href="/pages/todos.html" class="text-primary font-semibold hover:underline">Dashboard</a></li>
        <li class="text-border">/</li>
        <li aria-current="page" class="text-app-text font-semibold">Profile</li>
      </ol>
    </nav>

    <div class="flex items-center gap-3 mb-8">
      <button id="back-btn" class="p-1 rounded hover:bg-bg transition-colors" aria-label="Go back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <span class="text-xl font-bold" data-i18n="nav_title">Profile Settings</span>
    </div>

    <!-- Profile photo section -->
    <div class="flex flex-col items-center mb-8">
      <div id="photo-display" class="w-24 h-24 rounded-full bg-bg border border-border mb-3"></div>
      <button id="change-photo-btn" class="text-sm font-semibold text-primary hover:underline">
        Change Photo
      </button>
      <input type="file" id="photo-input" accept="image/*" class="hidden" />
    </div>

    <!-- EDIT PROFILE SECTION -->
    <div class="flex items-center gap-2 mb-4 font-semibold text-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span data-i18n="section_profile">Edit Profile</span>
    </div>

    <div class="mb-4">
      <label for="username" class="block text-sm font-medium mb-1" data-i18n="field_username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:border-primary" />
    </div>

    <div class="mb-4">
      <label for="fullname" class="block text-sm font-medium mb-1" data-i18n="field_fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="Enter your full name e.g. Naiga Hawah" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:border-primary" />
    </div>

    <div class="mb-6">
      <label for="email" class="block text-sm font-medium mb-1" data-i18n="field_email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your email e.g. hawah@email.com" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:border-primary" />
    </div>

    <div class="border-t border-border my-6"></div>

    <!-- EDIT PASSWORD SECTION -->
    <div class="flex items-center gap-2 mb-4 font-semibold text-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span data-i18n="section_password">Edit Password</span>
    </div>

    <div class="mb-4">
      <label for="current-password" class="block text-sm font-medium mb-1" data-i18n="field_current_pass">Current Password</label>
      <input type="password" id="current-password" placeholder="Enter your current password" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:border-primary" />
    </div>

    <div class="mb-4">
      <label for="new-password" class="block text-sm font-medium mb-1" data-i18n="field_new_pass">New Password</label>
      <input type="password" id="new-password" placeholder="Enter your new password" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:border-primary" />
    </div>

    <div class="mb-6">
      <label for="confirm-password" class="block text-sm font-medium mb-1" data-i18n="field_confirm_pass">Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm your new password" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:border-primary" />
    </div>

    <div class="border-t border-border my-6"></div>

    <!-- LANGUAGE SELECTOR -->
    <div class="mb-6">
      <label for="language-select" class="block text-sm font-medium mb-1" data-i18n="field_app_lang">Application Language</label>
      <select id="language-select" class="w-full px-3 py-2 border border-border rounded-lg">
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>

    <button id="save-btn" class="w-full flex items-center justify-center gap-2 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-primary-dark transition-colors">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span data-i18n="btn_save">Save Changes</span>
    </button>

    <div id="success-msg" class="hidden mt-4 text-green-700 bg-green-50 border border-green-200 rounded-lg px-4 py-2 text-sm"></div>
    <div id="error-msg" class="hidden mt-4 text-red-700 bg-red-50 border border-red-200 rounded-lg px-4 py-2 text-sm"></div>

  </div>

  <!-- CHANGED: no inline <script> — logic lives in scripts/profile.ts, bundled by esbuild -->
</body>
</html>
