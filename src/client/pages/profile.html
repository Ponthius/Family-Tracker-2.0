<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile - Family Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/profile.css">
</head>
<body class="profile-shell">
  <div class="profile-layout">
    <aside class="sidebar">
      <div class="sidebar__brand">
          <a href="/pages/dashboard.html" class="sidebar__brand-link">
            <i class="fas fa-users"></i>
            <span data-family-name>Family Tracker</span>
          </a>
      </div>
      <nav class="sidebar__nav">
        <a href="/pages/dashboard.html" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
        <a href="/pages/tasks.html" data-page="tasks"><i class="fas fa-calendar-alt"></i><span>Tasks</span></a>
        <a href="/pages/members.html" data-page="members"><i class="fas fa-user-friends"></i><span>Members</span></a>
        <a href="/pages/schedules.html" data-page="schedules"><i class="fas fa-clock"></i><span>Schedules</span></a>
        <a href="/pages/profile.html" data-page="profile" class="is-active"><i class="fas fa-user-circle"></i><span>Profile</span></a>
      </nav>
    </aside>

    <main class="profile-main">
      <section class="profile-card">
        <header class="profile-header">
          <button class="profile-back" id="backBtn" type="button" aria-label="Go back">
            <i class="fas fa-arrow-left"></i>
          </button>
          <div>
            <p class="profile-eyebrow">Account Settings</p>
            <h1>Profile</h1>
          </div>
          <button class="profile-theme" id="themeToggle" type="button" title="Toggle system mode">
            <i class="fas fa-moon"></i>
          </button>
        </header>
        <button id="logoutBtn" class="danger-btn" type="button" style="margin-bottom:12px;">Log Out</button>

        <div id="successMsg" class="status status--success" hidden></div>
        <div id="errorMsg" class="status status--error" hidden></div>

        <section class="profile-section">
          <h2>Personal Information</h2>
          <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="e.g. poel_admin">
          </div>
          <div class="field">
            <label for="fullName">Full name</label>
            <input id="fullName" type="text" placeholder="e.g. Ponthius Poel">
          </div>
          <div class="field">
            <label for="email">Email address</label>
            <input id="email" type="email" readonly>
          </div>
          <div class="field">
            <label for="language">Interface language</label>
            <select id="language">
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="sw">Swahili</option>
              <option value="lg">Luganda</option>
              <option value="es">Spanish</option>
            </select>
          </div>
        </section>

        <section class="profile-section">
          <h2>Security & Credentials</h2>
          <div class="field">
            <label for="currentPassword">Current password</label>
            <input id="currentPassword" type="password" placeholder="Enter current password">
          </div>
          <div class="field">
            <label for="newPassword">New password</label>
            <input id="newPassword" type="password" placeholder="Minimum 8 characters">
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <input id="confirmPassword" type="password" placeholder="Re-enter your password">
          </div>
        </section>

        <section class="profile-section">
          <h2>Workspace Branding</h2>
          <div class="field">
            <label for="familyName">Family name</label>
            <input id="familyName" type="text" placeholder="e.g. Smith Family">
          </div>

          <div class="logo-preview">
            <div class="logo-preview__frame">
              <i id="logoPlaceholder" class="fas fa-seedling"></i>
              <img id="logoImage" alt="Brand preview" hidden>
            </div>
          </div>

          <div class="field">
            <label for="logoUrl">Logo URL</label>
            <input id="logoUrl" type="url" placeholder="https://example.com/logo.png">
          </div>
          <div class="field">
            <label for="accentColor">Accent color</label>
            <div class="color-row">
              <input id="accentColor" type="color" value="#8b7355">
              <span id="colorCode">#8B7355</span>
            </div>
          </div>
        </section>

        <section class="profile-section profile-section--danger">
          <h2>Danger Zone</h2>
          <p>This suspends your account immediately and removes it after the grace period.</p>
          <button id="deleteAccountBtn" class="danger-btn" type="button">Delete Account</button>
        </section>

        <button id="saveBtn" class="save-btn" type="button">Save Settings</button>
      </section>
    </main>
  </div>

  <script type="module" src="/scripts/profile.js"></script>
</body>
</html>
