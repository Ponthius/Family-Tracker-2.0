<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Todo App</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-md p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Log in</h1>

    <form id="login-form" class="space-y-4" novalidate>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email address
        </label>
        <input
          id="email" type="email" name="email" required autocomplete="email"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          id="password" type="password" name="password" required autocomplete="current-password"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <p id="error-message" class="text-sm text-red-600 min-h-[1.25rem]"></p>

      <button
        type="submit"
        class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-lg
               hover:bg-indigo-700 transition-colors"
      >
        Log in
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600">
      No account yet?
      <a href="/pages/register.html" class="text-indigo-600 hover:underline">Create one</a>
    </p>
  </div>

  <!-- login.js is compiled from src/client/scripts/login.ts -->
  <script type="module" src="/scripts/login.js"></script>
</body>
</html>
