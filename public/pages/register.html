<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — Todo App</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-md p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Create account</h1>

    <form id="register-form" class="space-y-4" novalidate>
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
          Full name
        </label>
        <input
          id="name" type="text" name="name" required autocomplete="name"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email address
        </label>
        <input
          id="email" type="email" name="email" required autocomplete="email"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          id="password" type="password" name="password" required autocomplete="new-password"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <p id="error-message" class="text-sm text-red-600 min-h-[1.25rem]"></p>

      <button
        type="submit"
        class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-lg
               hover:bg-indigo-700 transition-colors"
      >
        Create account
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600">
      Already have an account?
      <a href="/pages/login.html" class="text-indigo-600 hover:underline">Log in</a>
    </p>
  </div>

  <!-- register.js is compiled from src/client/scripts/register.ts -->
  <script type="module" src="/scripts/register.js"></script>
</body>
</html>
